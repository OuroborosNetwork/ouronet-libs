name: Publish to npmjs.org

# Triggered by pushing a version tag (e.g. v4.3.6).
#
# Smart per-package publish (same pattern as stoa-js, trimmed to this repo's two
# packages). A tag `vX.Y.Z` publishes whichever package's package.json version
# equals X.Y.Z:
#
#   - @ouronet/ouronet-core   (4.x — Ouronet protocol business logic)
#   - @ouronet/ouronet-codex  (independent 0.x semver — React Codex layer)
#
# The two carry independent version lines, so a release is normally ONE tag for
# ONE package (v4.3.6 → ouronet-core; v0.5.7 → ouronet-codex). At least one
# package MUST match the tag, else the workflow fails before npm sees a byte.
#
# The chain-level halves (@stoachain/stoa-core, @stoachain/kadena-stoic-legacy)
# live in stoa-js and are consumed here from npm as ordinary dependencies.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Smart per-package publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write   # gh release create
      id-token: write   # npm --provenance (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Explicit root .npmrc. Both scopes point at public npmjs: @ouronet is what
      # we publish, @stoachain is what we INSTALL (stoa-core / kadena-stoic-legacy).
      - name: Write .npmrc with auth token
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${{ secrets.NPM_PUBLISHER }}
          @ouronet:registry=https://registry.npmjs.org
          @stoachain:registry=https://registry.npmjs.org
          always-auth=true
          EOF
          echo "--- .npmrc structure (token redacted) ---"
          sed 's|=.*|=***|' .npmrc

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      # typecheck → build → test gates the publish. Build precedes test so any
      # dist-resolved imports exist.
      - name: Typecheck + Build + Test
        run: |
          npm run typecheck
          npm run build
          npm test

      - name: Detect publish queue (which package matches the tag?)
        id: queue
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CORE_VERSION=$(node -p "require('./packages/ouronet-core/package.json').version")
          CODEX_VERSION=$(node -p "require('./packages/ouronet-codex/package.json').version")
          echo "Tag: $TAG_VERSION | ouronet-core: $CORE_VERSION | ouronet-codex: $CODEX_VERSION"

          PUBLISH_CORE="false"; PUBLISH_CODEX="false"
          [ "$TAG_VERSION" = "$CORE_VERSION" ] && PUBLISH_CORE="true"
          [ "$TAG_VERSION" = "$CODEX_VERSION" ] && PUBLISH_CODEX="true"

          if [ "$PUBLISH_CORE" = "false" ] && [ "$PUBLISH_CODEX" = "false" ]; then
            echo "::error::Tag $TAG_VERSION matches neither package (ouronet-core=$CORE_VERSION, ouronet-codex=$CODEX_VERSION)."
            exit 1
          fi

          echo "PUBLISH_OURONET_CORE=$PUBLISH_CORE"   >> "$GITHUB_OUTPUT"
          echo "PUBLISH_OURONET_CODEX=$PUBLISH_CODEX" >> "$GITHUB_OUTPUT"
          echo "TAG_VERSION=$TAG_VERSION"             >> "$GITHUB_OUTPUT"
          echo "── Publish queue ──"
          echo "  @ouronet/ouronet-core:  $PUBLISH_CORE"
          echo "  @ouronet/ouronet-codex: $PUBLISH_CODEX"

      # Each queued package's own README + CHANGELOG must reference the shipping
      # version — they're what npmjs.com renders.
      - name: Verify README + CHANGELOG parity for queued packages
        run: |
          TAG_VERSION="${{ steps.queue.outputs.TAG_VERSION }}"
          QUEUED=()
          [ "${{ steps.queue.outputs.PUBLISH_OURONET_CORE }}"  = "true" ] && QUEUED+=("packages/ouronet-core")
          [ "${{ steps.queue.outputs.PUBLISH_OURONET_CODEX }}" = "true" ] && QUEUED+=("packages/ouronet-codex")

          for PKG_DIR in "${QUEUED[@]}"; do
            PKG_NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
            echo "── Validating ${PKG_NAME} ──"
            if ! grep -qE "\`${TAG_VERSION}\`[[:space:]]+on public npmjs" "${PKG_DIR}/README.md"; then
              echo "::error::${PKG_DIR}/README.md ## Status block does not lead with version ${TAG_VERSION}"; exit 1
            fi
            if ! grep -qE "^\*\*v${TAG_VERSION}\*\*[[:space:]]" "${PKG_DIR}/README.md"; then
              echo "::error::${PKG_DIR}/README.md version history missing a **v${TAG_VERSION}** paragraph"; exit 1
            fi
            FIRST_HEADING=$(grep -m1 '^## ' "${PKG_DIR}/CHANGELOG.md")
            if ! echo "$FIRST_HEADING" | grep -qE "^## ${TAG_VERSION}[[:space:]]"; then
              echo "::error::${PKG_DIR}/CHANGELOG.md first heading is not ${TAG_VERSION} (found: ${FIRST_HEADING})"; exit 1
            fi
            echo "✓ ${PKG_NAME} docs reference ${TAG_VERSION}"
          done

      - name: Verify npm auth
        run: npm whoami || echo "::warning::whoami failed — publish may too"

      # Order: ouronet-core before ouronet-codex (codex peer-deps core).
      # Idempotent: skip when the version is already on the registry.
      - name: Publish @ouronet/ouronet-core
        if: steps.queue.outputs.PUBLISH_OURONET_CORE == 'true'
        run: |
          V="${{ steps.queue.outputs.TAG_VERSION }}"
          if npm view @ouronet/ouronet-core@${V} version >/dev/null 2>&1; then
            echo "@ouronet/ouronet-core@${V} already on npm — skipping (idempotent)."
          else
            npm publish --workspace=@ouronet/ouronet-core --access public --provenance
          fi

      - name: Publish @ouronet/ouronet-codex
        if: steps.queue.outputs.PUBLISH_OURONET_CODEX == 'true'
        run: |
          V="${{ steps.queue.outputs.TAG_VERSION }}"
          if npm view @ouronet/ouronet-codex@${V} version >/dev/null 2>&1; then
            echo "@ouronet/ouronet-codex@${V} already on npm — skipping publish."
          else
            npm publish --workspace=@ouronet/ouronet-codex --access public --provenance
          fi

          # `npm publish` already points `latest` at this version. This step
          # exists only to PROMOTE a version that was published under some other
          # dist-tag, so it must not fail the release when there is nothing to
          # promote. On a first publish under a new scope the registry needs a
          # few minutes to serve the packument, and an immediate `dist-tag add`
          # 404s on a package that demonstrably just published — that raced here
          # on 0.5.7 and turned a good release red.
          for attempt in 1 2 3 4 5 6; do
            CURRENT=$(npm view @ouronet/ouronet-codex dist-tags.latest 2>/dev/null || true)
            if [ "$CURRENT" = "$V" ]; then
              echo "latest already points at ${V} — nothing to promote."
              exit 0
            fi
            if [ -n "$CURRENT" ]; then
              echo "latest is ${CURRENT}; promoting ${V}."
              npm dist-tag add @ouronet/ouronet-codex@${V} latest
              exit 0
            fi
            echo "attempt ${attempt}: registry has not served the package yet; waiting 30s."
            sleep 30
          done
          echo "::warning::Could not confirm the dist-tag within 3 minutes. The publish itself succeeded; verify 'npm view @ouronet/ouronet-codex dist-tags' once the registry catches up."

      - name: Create GitHub Release for the pushed tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists — skipping."
          else
            gh release create "$TAG" --title "$TAG" --notes-from-tag --latest
            echo "Created GitHub Release for $TAG."
          fi
